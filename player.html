<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Taara Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d0d;
    font-family: 'Inter', 'Segoe UI', sans-serif;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── TOP BAR ── */
  .topbar {
    width: 100%;
    max-width: 1100px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
  }
  .topbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .back-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: #2a2a2a;
    border: none;
    color: #ccc;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s;
  }
  .back-btn:hover { background: #3a3a3a; }
  .title-group h1 { font-size: 15px; font-weight: 600; color: #fff; }
  .title-group p  { font-size: 12px; color: #888; margin-top: 1px; }
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .cast-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: #1e1e1e;
    border: 1.5px solid #333;
    color: #ccc;
    font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    position: relative;
  }
  .cast-btn::after {
    content: '';
    width: 8px; height: 8px;
    background: #22c55e;
    border-radius: 50%;
    position: absolute;
    top: 0; right: 0;
    border: 1.5px solid #0d0d0d;
  }
  .details-btn {
    background: none;
    border: none;
    color: #ccc;
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; gap: 4px;
  }
  .details-btn:hover { color: #fff; }

  /* ── PLAYER WRAPPER ── */
  .player-wrapper {
    width: 100%;
    max-width: 1100px;
    padding: 0 20px 6px;
  }
  .player-container {
    width: 100%;
    background: #111;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    aspect-ratio: 16/9;
    cursor: pointer;
  }

  /* Now Playing label */
  .now-playing-label {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 5;
    pointer-events: none;
  }
  .now-playing-label span {
    display: block;
    font-size: 11px;
    color: #aaa;
    letter-spacing: .5px;
    margin-bottom: 3px;
  }
  .now-playing-label h2 {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
  }

  /* iframe / loading */
  #player-frame {
    width: 100%; height: 100%;
    border: none;
    display: block;
    position: relative;
    z-index: 2;
  }
  .player-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 3;
    background: rgba(0,0,0,.55);
    transition: opacity .3s;
  }
  .player-overlay.hidden { opacity: 0; pointer-events: none; }

  /* Spinner */
  .spinner {
    width: 42px; height: 42px;
    border: 3px solid rgba(255,255,255,.15);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin-bottom: 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Play icon */
  .play-icon {
    width: 64px; height: 64px;
    background: rgba(255,255,255,.18);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
    cursor: pointer;
    transition: background .2s, transform .15s;
  }
  .play-icon:hover { background: rgba(255,255,255,.28); transform: scale(1.07); }
  .play-icon svg { width: 28px; height: 28px; fill: #fff; margin-left: 4px; }

  /* Switch label */
  .switching-label {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    background: rgba(0,0,0,.75);
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 13px;
    color: #fff;
    z-index: 10;
    display: none;
    text-align: center;
  }
  .switching-label.show { display: block; }

  /* Screen-right icons */
  .screen-right {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 14px;
    z-index: 6;
  }
  .screen-icon {
    width: 32px; height: 32px;
    background: rgba(255,255,255,.08);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    color: #ccc;
    cursor: pointer;
    font-size: 15px;
    transition: background .2s;
  }
  .screen-icon:hover { background: rgba(255,255,255,.18); }

  /* ── PROGRESS BAR ── */
  .progress-area {
    width: 100%;
    max-width: 1100px;
    padding: 10px 20px 0;
  }
  .time-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .time-label {
    font-size: 13px;
    color: #aaa;
    min-width: 38px;
  }
  .time-label.right { text-align: right; }
  .progress-track {
    flex: 1;
    height: 4px;
    background: #333;
    border-radius: 2px;
    position: relative;
    cursor: pointer;
  }
  .progress-fill {
    height: 100%;
    background: #e8401c;
    border-radius: 2px;
    width: 50%;
    position: relative;
    transition: width .1s;
  }
  .progress-thumb {
    width: 14px; height: 14px;
    background: #fff;
    border-radius: 50%;
    position: absolute;
    right: -7px;
    top: -5px;
    box-shadow: 0 0 0 2px rgba(255,255,255,.2);
    cursor: grab;
  }

  /* ── CONTROLS ROW ── */
  .controls-row {
    width: 100%;
    max-width: 1100px;
    padding: 8px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .ctrl-group { display: flex; align-items: center; gap: 8px; }
  .ctrl-btn {
    width: 36px; height: 36px;
    background: #1e1e1e;
    border: 1.5px solid #2e2e2e;
    border-radius: 50%;
    color: #ccc;
    font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background .2s, color .2s, border-color .2s;
    position: relative;
  }
  .ctrl-btn:hover { background: #2d2d2d; color: #fff; border-color: #444; }
  .ctrl-btn.active { color: #e8401c; border-color: #e8401c; }

  /* tooltip */
  .ctrl-btn[data-tip]:hover::after {
    content: attr(data-tip);
    position: absolute;
    bottom: 44px;
    left: 50%; transform: translateX(-50%);
    background: #222;
    border: 1px solid #333;
    border-radius: 5px;
    padding: 4px 8px;
    font-size: 11px;
    white-space: nowrap;
    color: #ddd;
    pointer-events: none;
    z-index: 20;
  }

  /* ── BOTTOM ACTION BAR ── */
  .action-bar {
    width: 100%;
    max-width: 1100px;
    padding: 0 20px 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .ab-btn {
    height: 38px;
    padding: 0 14px;
    border-radius: 8px;
    border: 1.5px solid #2e2e2e;
    background: #1a1a1a;
    color: #ccc;
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: background .2s, color .2s;
    white-space: nowrap;
  }
  .ab-btn:hover { background: #2a2a2a; color: #fff; }
  .ab-btn.primary {
    background: #e8401c;
    border-color: #e8401c;
    color: #fff;
    font-weight: 600;
  }
  .ab-btn.primary:hover { background: #d03518; }
  .ab-btn.success {
    background: #1a1a1a;
    border-color: #2e2e2e;
    color: #22c55e;
  }
  .ab-btn.success:hover { background: #2a2a2a; }

  /* ── SERVER PANEL ── */
  .server-panel {
    width: 100%;
    max-width: 1100px;
    padding: 0 20px 24px;
  }
  .server-panel h3 {
    font-size: 12px;
    color: #666;
    letter-spacing: .8px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .server-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .srv-btn {
    padding: 6px 12px;
    border-radius: 6px;
    border: 1.5px solid #2a2a2a;
    background: #181818;
    color: #aaa;
    font-size: 12px;
    cursor: pointer;
    transition: all .2s;
    display: flex; align-items: center; gap: 5px;
  }
  .srv-btn:hover { background: #242424; color: #fff; border-color: #444; }
  .srv-btn.active {
    background: #1e1e1e;
    border-color: #e8401c;
    color: #fff;
  }
  .srv-btn .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #555;
    flex-shrink: 0;
  }
  .srv-btn.active .dot { background: #22c55e; }
  .srv-btn.loading .dot { background: #f59e0b; animation: pulse .8s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* status toast */
  .status-toast {
    position: fixed;
    top: 16px; left: 50%; transform: translateX(-50%);
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 13px;
    color: #fff;
    z-index: 999;
    pointer-events: none;
    opacity: 0;
    transition: opacity .3s;
  }
  .status-toast.show { opacity: 1; }

  svg.icon { width: 16px; height: 16px; fill: currentColor; }
</style>
</head>
<body>

const mediaType= params.get('type')|| 'tv';
const season   = params.get('s')   || '1';
const episode  = params.get('e')   || '1';

// Build episode/movie URL per server
function buildUrl(srv) {
  // Some servers need episode path
  if (mediaType === 'tv') {
    const epMap = {
      'Vidsrc':     s => `https://vidsrc.to/embed/tv/${s}/${season}/${episode}`,
      'Vidsrc.me':  s => `https://vidsrc.me/embed/tv/${s}?season=${season}&episode=${episode}`,
      'Vidsrc.nl':  s => `https://player.vidsrc.nl/embed/tv/${s}/${season}/${episode}`,
      'Vidfast':    s => `https://vidfast.pro/tv/${s}/${season}/${episode}?autoPlay=true`,
      'SuperEmbed': s => `https://multiembed.mov/directstream.php?video_id=${s}&tmdb=1&s=${season}&e=${episode}`,
      'AutoEmbed':  s => `https://autoembed.co/tv/tmdb/${s}-${season}-${episode}`,
      'Embed.su':   s => `https://embed.su/embed/tv/${s}/${season}/${episode}`,
      '2Embed':     s => `https://www.2embed.cc/embedtv/${s}&s=${season}&e=${episode}`,
      'Smashystream':s=> `https://player.smashy.stream/tv/${s}?s=${season}&e=${episode}`,
      'Rive':       s => `https://rivestream.live/embed?type=tv&id=${s}&season=${season}&episode=${episode}`,
      'Vidlink':    s => `https://vidlink.pro/tv/${s}/${season}/${episode}`,
    };
    if (epMap[srv.name]) return epMap[srv.name](mediaId);
  }
  return srv.url(mediaId);
}

// State
let currentIdx  = 0;
let switchTimer = null;
let muted       = false;
let paused      = false;
let noPopup     = true;

// Build server buttons
const grid = document.getElementById('serverGrid');
SERVERS.forEach((srv, i) => {
  const btn = document.createElement('button');
  btn.className = 'srv-btn' + (i === 0 ? ' active' : '');
  btn.id = `srv-${i}`;
  btn.innerHTML = `<span class="dot"></span>${srv.name}`;
  btn.onclick = () => loadServer(i, true);
  grid.appendChild(btn);
});

// Load a server
function loadServer(idx, manual = false) {
  clearTimeout(switchTimer);

  // Update buttons
  document.querySelectorAll('.srv-btn').forEach((b, i) => {
    b.className = 'srv-btn' + (i === idx ? ' loading' : '');
  });

  currentIdx = idx;
  const frame = document.getElementById('player-frame');
  const overlay = document.getElementById('playerOverlay');
  const switchLabel = document.getElementById('switchLabel');

  if (!manual && idx > 0) {
    switchLabel.classList.add('show');
    setTimeout(() => switchLabel.classList.remove('show'), 2200);
  }

  // Show overlay/spinner
  overlay.classList.remove('hidden');
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('playIcon').style.display = 'none';

  const url = buildUrl(SERVERS[idx]);
  frame.src = url;

  // After 3.8s: if still not playing, auto switch
  if (!manual) {
    switchTimer = setTimeout(() => {
      const nextIdx = (currentIdx + 1) % SERVERS.length;
      showToast(`⚡ Auto-switching to ${SERVERS[nextIdx].name}`);
      loadServer(nextIdx, false);
    }, 3800);
  }

  // Simulate load complete after 2.5s (iframe can't reliably fire onload for video)
  setTimeout(() => {
    clearTimeout(switchTimer); // server responded
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('playIcon').style.display = 'flex';
    overlay.classList.add('hidden');
    // Mark active
    document.querySelectorAll('.srv-btn').forEach((b, i) => {
      b.className = 'srv-btn' + (i === currentIdx ? ' active' : '');
    });
    showToast(`▶ Playing on ${SERVERS[idx].name}`);
  }, 2500);
}

function manualPlay() {
  document.getElementById('playerOverlay').classList.add('hidden');
  clearTimeout(switchTimer);
}

// Skip = next server
function skipServer() {
  const next = (currentIdx + 1) % SERVERS.length;
  showToast(`Skipping to ${SERVERS[next].name}…`);
  loadServer(next, false);
}

function reloadPlayer() {
  showToast('Reloading…');
  loadServer(currentIdx, true);
}

// Controls
function togglePause(btn) {
  paused = !paused;
  btn.innerHTML = paused
    ? `<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>`
    : `<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;
  showToast(paused ? 'Paused' : 'Playing');
}

function toggleMute(btn) {
  muted = !muted;
  btn.innerHTML = muted
    ? `<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>`
    : `<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>`;
  showToast(muted ? 'Muted' : 'Unmuted');
}

function toggleCtrl(btn) {
  btn.classList.toggle('active');
}

function toggleSettings() {
  showToast('Settings panel coming soon');
}

function goFullscreen() {
  const el = document.getElementById('playerContainer');
  if (document.fullscreenElement) document.exitFullscreen();
  else el.requestFullscreen();
}

function togglePip() {
  showToast('PiP not available for embedded players');
}

// Audio cycle
const audios = ['Hindi', 'English', 'Tamil', 'Telugu'];
let audioIdx = 0;
function setAudio() {
  audioIdx = (audioIdx + 1) % audios.length;
  document.getElementById('audioLabel').textContent = audios[audioIdx];
  showToast(`Audio: ${audios[audioIdx]}`);
}

// No-popup toggle
function togglePopup(btn) {
  noPopup = !noPopup;
  document.getElementById('popupLabel').textContent = noPopup ? 'No-popup' : 'Popup ON';
  btn.className = noPopup ? 'ab-btn success' : 'ab-btn';
  showToast(noPopup ? 'Popup blocker ON' : 'Popup blocker OFF');
}

// Progress bar click
function seekTo(e) {
  const track = document.getElementById('progressTrack');
  const rect = track.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  document.getElementById('progressFill').style.width = (pct * 100) + '%';
}

// Toast
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// Auto-start Vidfast (index 0) immediately
window.addEventListener('DOMContentLoaded', () => {
  loadServer(0, false);
});
</script>
</body>
