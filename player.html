<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taara Player</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --accent: #e91e8c;
    --accent2: #7c3aed;
    --text: #f0f0f8;
    --muted: #7a7a99;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

  /* TOP BAR */
  .topbar {
    height: 56px; display: flex; align-items: center; gap: 14px;
    padding: 0 20px; background: var(--surface); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 50;
  }
  .back-btn {
    display: flex; align-items: center; gap: 7px; background: none; border: none;
    color: var(--muted); cursor: pointer; font-size: 14px; font-weight: 500; padding: 6px 10px;
    border-radius: 8px; transition: all 0.2s;
  }
  .back-btn:hover { background: var(--surface2); color: var(--text); }
  .logo-text { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800;
    background: linear-gradient(135deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .topbar-title { font-size: 14px; color: var(--muted); margin-left: 4px; flex: 1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* LAYOUT */
  .page { display: grid; grid-template-columns: 1fr 320px; gap: 0; min-height: calc(100vh - 56px); }
  @media (max-width: 900px) { .page { grid-template-columns: 1fr; } .sidebar-info { border-left: none; border-top: 1px solid var(--border); } }

  /* PLAYER COLUMN */
  .player-col { display: flex; flex-direction: column; }

  /* PLAYER BOX */
  .player-box { position: relative; width: 100%; background: #000; aspect-ratio: 16/9; }
  .player-box iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
  .player-splash {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 20px; background: #000;
    cursor: pointer; transition: background 0.2s;
  }
  .player-splash:hover { background: #0a0a0a; }
  .splash-poster { width: 70px; height: 105px; object-fit: cover; border-radius: 8px; opacity: 0.5; }
  .splash-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; text-align: center; padding: 0 20px; }
  .splash-sub { font-size: 12px; color: var(--muted); }
  .splash-play {
    width: 72px; height: 72px; background: var(--accent); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 40px rgba(233,30,140,0.4); transition: transform 0.2s, box-shadow 0.2s;
  }
  .player-splash:hover .splash-play { transform: scale(1.08); box-shadow: 0 0 60px rgba(233,30,140,0.6); }

  /* SERVER BAR */
  .server-bar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 10px 16px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .server-label { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; }
  .srv-btn {
    padding: 5px 14px; border-radius: 7px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: 1px solid var(--border); background: var(--surface2);
    color: var(--muted); transition: all 0.2s; display: flex; align-items: center; gap: 5px;
  }
  .srv-btn:hover { border-color: var(--accent); color: var(--text); }
  .srv-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .srv-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.7; }
  .ad-note { margin-left: auto; font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
  .ad-note a { color: var(--accent); text-decoration: none; }

  /* EPISODE BAR (TV/Anime only) */
  .ep-bar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 10px 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .ep-label { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .ep-select {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    border-radius: 7px; padding: 5px 10px; font-size: 13px; cursor: pointer; outline: none;
  }
  .ep-select:focus { border-color: var(--accent); }

  /* INFO BELOW PLAYER */
  .player-info { padding: 20px; flex: 1; }
  .pi-row { display: flex; gap: 16px; margin-bottom: 16px; }
  .pi-poster { width: 80px; height: 120px; object-fit: cover; border-radius: 8px; flex-shrink: 0; background: var(--surface2); }
  .pi-meta h1 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; margin-bottom: 6px; line-height: 1.2; }
  .meta-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; font-size: 11px; color: var(--muted); }
  .rating-big { display: flex; align-items: center; gap: 6px; font-size: 16px; font-weight: 700; color: #ffd700; margin-bottom: 8px; }
  .overview { font-size: 13px; color: var(--muted); line-height: 1.75; }
  .section-title { font-size: 11px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px; }

  /* SIDEBAR INFO */
  .sidebar-info { border-left: 1px solid var(--border); padding: 20px; overflow-y: auto; background: var(--surface); }
  .rec-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800; margin-bottom: 14px; }
  .rec-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .rec-card { border-radius: 8px; overflow: hidden; cursor: pointer; background: var(--surface2); transition: transform 0.15s; }
  .rec-card:hover { transform: translateY(-2px); }
  .rec-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
  .rec-card-info { padding: 6px 8px; }
  .rec-card-title { font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rec-card-year { font-size: 10px; color: var(--muted); }

  /* EMPTY */
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <button class="back-btn" onclick="history.back()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </button>
  <span class="logo-text">Taara</span>
  <span class="topbar-title" id="topTitle">Loading...</span>
</div>

<div class="page">
  <!-- LEFT: PLAYER + INFO -->
  <div class="player-col">

    <!-- PLAYER -->
    <div class="player-box" id="playerBox">
      <div class="player-splash" id="splash" onclick="startPlay()">
        <img class="splash-poster" id="splashPoster" src="" alt="">
        <div class="splash-play">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </div>
        <div class="splash-title" id="splashTitle"></div>
        <div class="splash-sub">Tap to play</div>
      </div>
      <iframe id="playerFrame" src="" allowfullscreen style="display:none;" allow="autoplay; fullscreen; picture-in-picture"></iframe>
    </div>

    <!-- SERVER BAR -->
    <div class="server-bar">
      <span class="server-label">Server</span>
      <button class="srv-btn active" onclick="switchServer('vidlink', this)">
        <span class="srv-dot"></span> VidLink
      </button>
      <button class="srv-btn" onclick="switchServer('multiembed', this)">
        <span class="srv-dot"></span> MultiEmbed
      </button>
      <span class="ad-note">
        Ad blocker? →
        <a href="https://ublockorigin.com" target="_blank">uBlock Origin</a>
      </span>
    </div>

    <!-- EPISODE SELECTOR (shown for TV/Anime) -->
    <div class="ep-bar" id="epBar" style="display:none;">
      <span class="ep-label">Season</span>
      <select class="ep-select" id="seasonSel" onchange="onSeasonChange()"></select>
      <span class="ep-label">Episode</span>
      <select class="ep-select" id="episodeSel" onchange="onEpisodeChange()"></select>
    </div>

    <!-- INFO -->
    <div class="player-info">
      <div class="pi-row">
        <img class="pi-poster" id="infoPoster" src="" alt="">
        <div class="pi-meta">
          <h1 id="infoTitle"></h1>
          <div class="rating-big">★ <span id="infoRating"></span></div>
          <div class="meta-chips" id="infoChips"></div>
        </div>
      </div>
      <div class="overview" id="infoOverview"></div>
    </div>

  </div>

  <!-- RIGHT: RECOMMENDED -->
  <div class="sidebar-info">
    <div class="rec-title">More Like This</div>
    <div id="recGrid"><div class="empty">Loading...</div></div>
  </div>
</div>

<script>
const TMDB_KEY = 'b5b7d1f4d0e4e06c25edbc2e6cc0d6d5';
const TMDB = 'https://api.themoviedb.org/3';
const IMG = 'https://image.tmdb.org/t/p/w500';
const JIKAN = 'https://api.jikan.moe/v4';

let item = null;
let currentServer = 'vidlink';
let currentSeason = 1;
let currentEpisode = 1;
let isPlaying = false;

// ---- INIT ----
window.onload = () => {
  const raw = localStorage.getItem('taara_current');
  if (!raw) { document.body.innerHTML = '<div style="color:#fff;padding:40px;text-align:center">No content selected. <a href="taara.html" style="color:#e91e8c">Go back</a></div>'; return; }
  item = JSON.parse(raw);
  initPlayer();
  loadRecommended();
};

function initPlayer() {
  document.title = `${item.title} — Taara`;
  document.getElementById('topTitle').textContent = item.title;
  document.getElementById('splashTitle').textContent = item.title;
  document.getElementById('splashPoster').src = item.poster || '';
  document.getElementById('infoPoster').src = item.poster || '';
  document.getElementById('infoTitle').textContent = item.title;
  document.getElementById('infoRating').textContent = item.rating ? parseFloat(item.rating).toFixed(1) : 'N/A';
  document.getElementById('infoOverview').textContent = item.overview || 'No description available.';

  // Chips
  const chips = [];
  if (item.year) chips.push(item.year);
  if (item.type) chips.push(item.type);
  if (item.episodes) chips.push(`${item.episodes} Episodes`);
  (item.genres || []).forEach(g => chips.push(g));
  document.getElementById('infoChips').innerHTML = chips.map(c => `<span class="chip">${c}</span>`).join('');

  // Episode bar for TV/Anime
  if (item.source !== 'movie') {
    document.getElementById('epBar').style.display = 'flex';
    buildSeasons();
  }
}

// ---- SEASONS / EPISODES ----
async function buildSeasons() {
  const sel = document.getElementById('seasonSel');
  sel.innerHTML = '';
  let totalSeasons = 3; // default

  if (item.source === 'tv') {
    try {
      const res = await fetch(`${TMDB}/tv/${item.id}?api_key=${TMDB_KEY}`);
      const data = await res.json();
      totalSeasons = data.number_of_seasons || 3;
    } catch(e) {}
  } else if (item.source === 'anime') {
    totalSeasons = 1;
  }

  for (let s = 1; s <= totalSeasons; s++) {
    sel.innerHTML += `<option value="${s}">Season ${s}</option>`;
  }
  buildEpisodes(currentSeason);
}

function buildEpisodes(season) {
  const sel = document.getElementById('episodeSel');
  sel.innerHTML = '';
  // For anime use item.episodes, for TV default 24
  const total = item.source === 'anime' ? (item.episodes || 12) : 24;
  for (let e = 1; e <= total; e++) {
    sel.innerHTML += `<option value="${e}">Episode ${e}</option>`;
  }
}

function onSeasonChange() {
  currentSeason = parseInt(document.getElementById('seasonSel').value);
  currentEpisode = 1;
  document.getElementById('episodeSel').value = 1;
  buildEpisodes(currentSeason);
  if (isPlaying) startPlay();
}

function onEpisodeChange() {
  currentEpisode = parseInt(document.getElementById('episodeSel').value);
  if (isPlaying) startPlay();
}

// ---- EMBED URLs ----
function getURL(server) {
  const id = item.id;
  const s = currentSeason;
  const e = currentEpisode;

  if (item.source === 'movie') {
    if (server === 'vidlink')    return `https://vidlink.pro/movie/${id}`;
    if (server === 'multiembed') return `https://multiembed.mov/?video_id=${id}&tmdb=1`;
  }
  if (item.source === 'tv') {
    if (server === 'vidlink')    return `https://vidlink.pro/tv/${id}/${s}/${e}`;
    if (server === 'multiembed') return `https://multiembed.mov/?video_id=${id}&tmdb=1&s=${s}&e=${e}`;
  }
  if (item.source === 'anime') {
    if (server === 'vidlink')    return `https://vidlink.pro/anime/${id}/${s}/${e}`;
    if (server === 'multiembed') return `https://multiembed.mov/?video_id=${id}&tmdb=1&s=${s}&e=${e}`;
  }
  return `https://vidlink.pro/movie/${id}`;
}

// ---- PLAY ----
function startPlay() {
  const src = getURL(currentServer);
  const frame = document.getElementById('playerFrame');
  frame.src = src;
  frame.style.display = 'block';
  document.getElementById('splash').style.display = 'none';
  isPlaying = true;
}

function switchServer(server, el) {
  currentServer = server;
  document.querySelectorAll('.srv-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  if (isPlaying) startPlay();
}

// ---- RECOMMENDED ----
async function loadRecommended() {
  const grid = document.getElementById('recGrid');
  try {
    let items = [];
    if (item.source === 'anime') {
      const res = await fetch(`${JIKAN}/anime/${item.id}/recommendations`);
      const data = await res.json();
      items = (data.data || []).slice(0, 10).map(r => ({
        id: r.entry.mal_id,
        title: r.entry.title,
        poster: r.entry.images?.jpg?.image_url || '',
        year: '', source: 'anime', type: 'ANIME'
      }));
    } else {
      const type = item.source === 'movie' ? 'movie' : 'tv';
      const res = await fetch(`${TMDB}/${type}/${item.id}/recommendations?api_key=${TMDB_KEY}`);
      const data = await res.json();
      items = (data.results || []).slice(0, 10).map(m => ({
        id: m.id,
        title: m.title || m.name,
        poster: m.poster_path ? IMG + m.poster_path : '',
        year: (m.release_date || m.first_air_date || '').slice(0,4),
        source: item.source, type: item.type
      }));
    }

    if (!items.length) { grid.innerHTML = '<div class="empty">Nothing found.</div>'; return; }

    grid.innerHTML = items.map(r => `
      <div class="rec-card" onclick="goRec(${JSON.stringify(r).replace(/"/g,'&quot;')})">
        <img src="${r.poster || 'https://via.placeholder.com/150x225/12121a/7a7a99?text=?'}" alt="${r.title}"
          onerror="this.src='https://via.placeholder.com/150x225/12121a/7a7a99?text=?'" loading="lazy">
        <div class="rec-card-info">
          <div class="rec-card-title">${r.title}</div>
          <div class="rec-card-year">${r.year || r.type || ''}</div>
        </div>
      </div>
    `).join('');
  } catch(e) {
    grid.innerHTML = '<div class="empty">Could not load recommendations.</div>';
  }
}

function goRec(rec) {
  // Fetch full details then open player
  localStorage.setItem('taara_current', JSON.stringify(rec));
  window.location.reload();
}
</script>
</body>
</html>
